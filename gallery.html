  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Montserrat, sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
    }

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #000;
      padding: 15px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .logo {
      font-weight: 900;
      letter-spacing: 3px;
    }

    .nav-links {
      display: flex;
      gap: 25px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .nav-links a:hover {
      color: #ff00cc;
    }

    /* PAGE TITLE */
    .hero {
      padding-top: 120px;
      text-align: center;
      padding-bottom: 60px;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    .hero p {
      opacity: 0.7;
    }

    /* GALLERY GRID */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      padding: 0 8% 80px;
    }

    .gallery img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      border-radius: 20px;
      cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      box-shadow: 0 0 25px rgba(255, 0, 200, 0.3);
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 45px rgba(0, 255, 255, 0.6);
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border-radius: 20px;
    }

    .lightbox span {
      position: absolute;
      top: 40px;
      right: 60px;
      font-size: 40px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 40px;
      background: #111;
      font-size: 0.9rem;
      opacity: 0.6;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2rem;
      }

      .gallery img {
        height: 280px;
      }
    }

  </style>
</head>
